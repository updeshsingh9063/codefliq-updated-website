<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codefliq - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use Inter font for clean UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
                <p class="text-gray-500 text-sm mt-2">Access restricted to authorized personnel</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="login-email" required placeholder="updeshsingh9063@gmail.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100"></div>
                
                <button type="submit" id="login-btn"
                    class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
        <!-- Topbar -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-1.5 rounded-lg">
                        <i data-lucide="database" class="w-5 h-5"></i>
                    </div>
                    <h1 class="font-semibold text-lg">Codefliq Leads</h1>
                </div>
                <div class="flex items-center gap-4">
                    <button id="refresh-btn" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900 transition-colors bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-md font-medium">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Refresh
                    </button>
                    <button id="logout-btn" class="text-sm font-medium text-red-600 hover:text-red-700 transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">Recent Inquiries</h2>
                    <p class="text-gray-500 text-sm mt-1">Live data from MongoDB database</p>
                </div>
                <div class="text-sm text-gray-500 font-medium bg-white px-3 py-1 border border-gray-200 rounded-full shadow-sm">
                    Total: <span id="total-count" class="text-gray-900 font-bold">0</span>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="hidden flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500 font-semibold">
                                <th class="p-4 w-48">Date</th>
                                <th class="p-4 w-48">Name</th>
                                <th class="p-4 w-64">Contact Info</th>
                                <th class="p-4">Project Details</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100 text-sm">
                            <!-- Rows will be injected here via JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-16">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto text-gray-300 mb-4"></i>
                    <h3 class="text-gray-900 font-medium text-lg">No inquiries yet</h3>
                    <p class="text-gray-500 mt-1">When someone submits the contact form, it will appear here.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const tableBody = document.getElementById('table-body');
        const loadingState = document.getElementById('loading-state');
        const emptyState = document.getElementById('empty-state');
        const totalCount = document.getElementById('total-count');

        // API Base URL (Adjust this when deploying)
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000/api' 
            : 'https://codefliq-backend.onrender.com/api';

        // Check auth state on load
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('admin_token');
            if (token) {
                showDashboard();
            }
        });

        // Login Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            loginBtn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>';
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('admin_token', data.token);
                    showDashboard();
                } else {
                    loginError.textContent = data.error || 'Login failed';
                    loginError.classList.remove('hidden');
                }
            } catch (err) {
                loginError.textContent = 'Server connection error';
                loginError.classList.remove('hidden');
            } finally {
                loginBtn.innerHTML = 'Sign In';
                loginBtn.disabled = false;
            }
        });

        // Logout Handler
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            dashboardScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            loginForm.reset();
        });

        // Refresh Handler
        refreshBtn.addEventListener('click', () => {
            const icon = refreshBtn.querySelector('i');
            icon.classList.add('animate-spin');
            fetchData().finally(() => {
                setTimeout(() => icon.classList.remove('animate-spin'), 500);
            });
        });

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            fetchData();
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return new Intl.DateTimeFormat('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: 'numeric', hour12: true
            }).format(date);
        }

        async function fetchData() {
            const token = localStorage.getItem('admin_token');
            if (!token) return logoutBtn.click();

            tableBody.innerHTML = '';
            emptyState.classList.add('hidden');
            loadingState.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/admin/contacts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401 || res.status === 403) {
                    return logoutBtn.click(); // Token expired or invalid
                }

                const data = await res.json();
                loadingState.classList.add('hidden');
                totalCount.textContent = data.length;

                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                data.forEach(contact => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors group";
                    
                    const servicesHtml = contact.services && contact.services.length > 0 
                        ? `<div class="flex flex-wrap gap-1 mt-2">${contact.services.map(s => `<span class="bg-blue-50 text-blue-700 border border-blue-100 text-[10px] px-2 py-0.5 rounded-full font-medium">${s}</span>`).join('')}</div>`
                        : '';

                    tr.innerHTML = `
                        <td class="p-4 align-top text-gray-500 whitespace-nowrap">
                            ${formatDate(contact.createdAt)}
                        </td>
                        <td class="p-4 align-top font-medium text-gray-900">
                            ${contact.name}
                        </td>
                        <td class="p-4 align-top">
                            <div class="flex flex-col gap-1">
                                <a href="mailto:${contact.email}" class="text-blue-600 hover:underline flex items-center gap-1.5">
                                    <i data-lucide="mail" class="w-3.5 h-3.5"></i> ${contact.email}
                                </a>
                                <a href="tel:${contact.phone}" class="text-gray-600 hover:text-gray-900 flex items-center gap-1.5">
                                    <i data-lucide="phone" class="w-3.5 h-3.5"></i> ${contact.phone}
                                </a>
                            </div>
                        </td>
                        <td class="p-4 align-top">
                            <p class="text-gray-700 whitespace-pre-wrap">${contact.details}</p>
                            ${servicesHtml}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                
                lucide.createIcons(); // Re-initialize icons for dynamic content

            } catch (err) {
                loadingState.classList.add('hidden');
                console.error("Error fetching data:", err);
                alert("Failed to load data. Please check connection.");
            }
        }
    </script>
</body>
</html>
